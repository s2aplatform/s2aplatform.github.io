<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>S2A Platform - Elite Private Terminal</title>
    <script src='https://8x8.vc/vpaas-magic-cookie-36a469735d454659a5848600885e3532/external_api.js'></script>
    <style>
        /* ... (Existing Styles Kept) ... */
        :root {
            --primary: #ff6d00; --primary-glow: rgba(255, 109, 0, 0.4);
            --gold: #ffd700; --danger: #ff4444; --success: #00c853; --broadcast: #ff00ff;
            --bg: #121212; --nav-bg: #0a0a0a; --card-bg: #1e1e1e;
            --chat-bg: #141414; --msg-bg: #252525; --text: #e0e0e0;
            --subtext: #8e8e93; --border: #333; --input-bg: #1e1e1e;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* --- ROOM SELECTOR UI --- */
        #room-bar { background: var(--nav-bg); padding: 10px 25px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); align-items: center; }
        .room-input { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; font-size: 0.8rem; }

        /* ... (Remaining Auth & Main CSS from previous response) ... */
        #auth-overlay { position: fixed; inset: 0; background: #0b0b0d; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: rgba(25, 25, 30, 0.95); padding: 40px; border-radius: 28px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        #main-platform { display: none; flex-direction: column; width: 95%; max-width: 1000px; height: 85vh; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        nav { background: var(--nav-bg); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; background: var(--chat-bg); }
        .message { background: var(--msg-bg); padding: 14px 18px; border-radius: 12px; max-width: 70%; width: fit-content; position: relative; }
        .message.mine { align-self: flex-end; background: var(--primary); color: white; }
        .input-area { background: var(--nav-bg); padding: 25px; border-top: 1px solid var(--border); }
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-google { background: white; color: #1a1a1a; margin-bottom: 20px; width: 100%; }
    </style>
</head>
<body>

    <!-- Auth UI -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h1>S2A<span>.</span>Elite</h1>
            <button id="google-login-btn" class="btn btn-google">Google Login</button>
            <input type="email" id="email" class="auth-input" style="width:100%; margin-bottom:10px" placeholder="Email">
            <input type="password" id="password" class="auth-input" style="width:100%; margin-bottom:10px" placeholder="Password">
            <button id="email-login-btn" class="btn btn-primary" style="width:100%">Enter</button>
            <div id="auth-error" style="color:red; font-size:0.8rem; margin-top:10px"></div>
        </div>
    </div>

    <!-- Main Platform -->
    <div id="main-platform">
        <nav>
            <div style="font-weight: bold; color: var(--primary);">S2A ELITE TERMINAL</div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="color: var(--gold)">💰 <span id="coin-count">0</span></div>
                <button id="logout-btn" class="btn" style="background:rgba(255,255,255,0.1); color:white; font-size:0.7rem;">Logout</button>
            </div>
        </nav>

        <!-- PRIVATE ROOM BAR -->
        <div id="room-bar">
            <span style="font-size: 0.8rem; font-weight: bold;">ROOM:</span>
            <input type="text" id="room-code-input" class="room-input" placeholder="Enter Code (e.g. 1234)">
            <button onclick="joinRoom()" class="btn btn-primary" style="padding: 5px 12px; font-size: 0.75rem;">Join / Create</button>
            <span id="current-room-display" style="font-size: 0.75rem; color: var(--gold); margin-left: auto;">Current: Global</span>
        </div>

        <div id="chat-messages"></div>

        <div class="input-area">
            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-input" style="flex:1; padding:12px; border-radius:8px; background:#121212; border:1px solid #333; color:white;" placeholder="Message room...">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, runTransaction, serverTimestamp, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVPhbTlWBa0xBw0wo2wMU7XwynwqwVzGM",
            authDomain: "ccc-loginsystem.firebaseapp.com",
            projectId: "ccc-loginsystem",
            databaseURL: "https://ccc-loginsystem-default-rtdb.asia-southeast1.firebasedatabase.app/",
            appId: "1:205395547650:web:fd8270d52e193ee03cb91b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        let currentRoom = "global";
        let messageListener = null;

        // --- ROOM LOGIC ---
        window.joinRoom = () => {
            const newCode = document.getElementById('room-code-input').value.trim().toLowerCase();
            if (!newCode) return alert("Please enter a room code");

            // Stop listening to old room
            if (messageListener) off(ref(db, `rooms/${currentRoom}/messages`));
            
            currentRoom = newCode;
            document.getElementById('current-room-display').innerText = `Current: ${currentRoom}`;
            document.getElementById('chat-messages').innerHTML = ""; // Clear UI
            
            startListening();
            alert(`Entered Room: ${currentRoom}`);
        };

        function startListening() {
            const roomRef = ref(db, `rooms/${currentRoom}/messages`);
            messageListener = onChildAdded(roomRef, (snap) => {
                const data = snap.val();
                renderMessage(data);
            });
        }

        function renderMessage(data) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const isMine = data.uid === auth.currentUser?.uid;
            div.className = `message ${isMine ? 'mine' : ''}`;
            div.innerHTML = `<b>${data.name}</b><br>${data.text}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // --- SEND LOGIC ---
        document.getElementById('send-btn').onclick = () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !auth.currentUser) return;

            const uName = auth.currentUser.email.split('@')[0];
            push(ref(db, `rooms/${currentRoom}/messages`), {
                uid: auth.currentUser.uid,
                name: uName,
                text: text,
                time: serverTimestamp()
            });

            // Earn coins for chatting
            runTransaction(ref(db, `users/${auth.currentUser.uid}/coins`), (c) => (c || 0) + 10);
            input.value = "";
        };

        // --- AUTH & INITIALIZE ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
            document.getElementById('main-platform').style.display = user ? 'flex' : 'none';
            if(user) {
                startListening(); // Start with global/default
                onValue(ref(db, `users/${user.uid}/coins`), (s) => {
                    document.getElementById('coin-count').innerText = s.val() || 0;
                });
            }
        });

        document.getElementById('email-login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, email.value, password.value).catch(e => alert(e.message));
        };
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, googleProvider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
    </script>
</body>
</html>
