<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>S2A Elite - Multi-Room Terminal</title>
    <script src='https://8x8.vc/vpaas-magic-cookie-36a469735d454659a5848600885e3532/external_api.js'></script>
    <style>
        :root {
            --primary: #ff6d00; --primary-glow: rgba(255, 109, 0, 0.4);
            --gold: #ffd700; --danger: #ff4444; --success: #00c853; --broadcast: #ff00ff;
            --bg: #121212; --nav-bg: #0a0a0a; --card-bg: #1e1e1e;
            --chat-bg: #141414; --msg-bg: #252525; --text: #e0e0e0;
            --subtext: #8e8e93; --border: #333; --input-bg: #1e1e1e;
        }

        [data-theme="light"] {
            --bg: #f0f2f5; --nav-bg: #ffffff; --card-bg: #ffffff;
            --chat-bg: #f9f9f9; --msg-bg: #e4e6eb; --text: #1c1e21;
            --border: #ddd; --input-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* --- AUTH & LAYOUT --- */
        #auth-overlay { position: fixed; inset: 0; background: #0b0b0d; z-index: 10000; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0b0b0d 100%); }
        .auth-card { background: rgba(25, 25, 30, 0.95); padding: 40px; border-radius: 28px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        #main-platform { display: none; flex-direction: column; width: 95%; max-width: 1000px; height: 85vh; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        
        /* --- NAV & ROOM BAR --- */
        nav { background: var(--nav-bg); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        #room-bar { background: var(--nav-bg); padding: 10px 20px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); align-items: center; flex-wrap: wrap; }
        .room-input { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 6px 12px; border-radius: 6px; flex: 1; }

        /* --- CHAT MESSAGES --- */
        #chat-messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; background: var(--chat-bg); }
        .message { background: var(--msg-bg); padding: 12px 16px; border-radius: 12px; max-width: 70%; position: relative; }
        .message.mine { align-self: flex-end; background: var(--primary); color: white; }
        .message b { font-size: 0.75rem; color: var(--primary); display: block; margin-bottom: 2px; }
        .message.mine b { color: rgba(255,255,255,0.8); }
        .message.big-style { border: 3px solid var(--gold); background: #000 !important; max-width: 90%; }
        .message.big-style span { font-size: 2.2rem; font-weight: 800; color: var(--gold); }
        .delete-btn { position: absolute; top: 5px; right: 8px; cursor: pointer; opacity: 0; }
        .message:hover .delete-btn { opacity: 0.6; }

        /* --- UI COMPONENTS --- */
        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
        .input-area { background: var(--nav-bg); padding: 20px; border-top: 1px solid var(--border); }
        #broadcast-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: none; justify-content: center; align-items: center; text-align: center; color: var(--broadcast); font-size: 3rem; font-weight: 900; }
    </style>
</head>
<body data-theme="dark">

    <!-- Auth UI -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="color:white">S2A<span>.</span>Elite</h1>
            <button id="google-login-btn" class="btn btn-secondary" style="width:100%; margin-bottom:15px; justify-content:center; background:white; color:black">Google Login</button>
            <input type="email" id="email" class="room-input" style="width:100%; margin-bottom:10px; display:block; box-sizing:border-box" placeholder="Email">
            <input type="password" id="password" class="room-input" style="width:100%; margin-bottom:10px; display:block; box-sizing:border-box" placeholder="Password">
            <div style="display:flex; gap:10px">
                <button id="email-login-btn" class="btn btn-primary" style="flex:2; justify-content:center">Login</button>
                <button id="email-signup-btn" class="btn btn-secondary" style="flex:1; justify-content:center">Sign Up</button>
            </div>
            <div id="auth-error" style="color:red; font-size:0.8rem; margin-top:10px"></div>
        </div>
    </div>

    <!-- Main Platform -->
    <div id="main-platform">
        <nav>
            <div style="display:flex; align-items:center; gap:10px">
                <b style="color:var(--primary)">S2A ELITE</b>
                <button class="btn btn-secondary" id="theme-toggle" style="font-size:0.7rem; padding:4px 8px">Mode</button>
            </div>
            <div style="display:flex; align-items:center; gap:15px">
                <div style="color:var(--gold); font-weight:bold">💰 <span id="coin-count">0</span></div>
                <button id="logout-btn" class="btn btn-secondary" style="font-size:0.7rem; padding:4px 8px">Logout</button>
            </div>
        </nav>

        <!-- ROOM CONTROLS -->
        <div id="room-bar">
            <button onclick="joinRoom('global')" class="btn btn-primary" style="font-size:0.7rem; background:#444">🌍 GLOBAL</button>
            <input type="text" id="room-code-input" class="room-input" placeholder="Room Code...">
            <button onclick="joinRoom()" class="btn btn-primary" style="font-size:0.7rem">JOIN</button>
            <span id="current-room-display" style="font-size:0.75rem; color:var(--gold); margin-left:auto">Room: Global</span>
        </div>

        <div id="chat-messages"></div>

        <div class="input-area">
            <div style="display:flex; gap:10px; margin-bottom:10px">
                <input type="text" id="chat-input" class="room-input" style="padding:12px" placeholder="Transmit message...">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
            <div id="cooldown-text" style="display:none; color:var(--danger); font-size:0.7rem; margin-bottom:5px">Wait <span id="seconds">3</span>s...</div>
            <div style="display:flex; gap:10px">
                <button id="redeem-big" onclick="sendMessage('big')" class="btn btn-secondary" style="flex:1; font-size:0.7rem; border-color:var(--gold)" disabled>BIG (100💰)</button>
                <button id="redeem-broadcast" onclick="sendMessage('broadcast')" class="btn btn-secondary" style="flex:1; font-size:0.7rem; border-color:var(--broadcast)" disabled>BROADCAST (500💰)</button>
            </div>
        </div>
    </div>

    <div id="broadcast-screen"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, runTransaction, serverTimestamp, off, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVPhbTlWBa0xBw0wo2wMU7XwynwqwVzGM",
            authDomain: "ccc-loginsystem.firebaseapp.com",
            projectId: "ccc-loginsystem",
            databaseURL: "https://ccc-loginsystem-default-rtdb.asia-southeast1.firebasedatabase.app/",
            appId: "1:205395547650:web:fd8270d52e193ee03cb91b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        let currentRoom = "global", currentCoins = 0, lastSentTime = 0, messageListener = null;

        // --- AUTH ---
        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-overlay').style.display = u ? 'none' : 'flex';
            document.getElementById('main-platform').style.display = u ? 'flex' : 'none';
            if(u) {
                onValue(ref(db, `users/${u.uid}/coins`), (s) => {
                    currentCoins = s.val() || 0;
                    document.getElementById('coin-count').innerText = currentCoins;
                    document.getElementById('redeem-big').disabled = currentCoins < 100;
                    document.getElementById('redeem-broadcast').disabled = currentCoins < 500;
                });
                joinRoom('global');
            }
        });

        // --- ROOMS ---
        window.joinRoom = (target) => {
            const code = target || document.getElementById('room-code-input').value.trim().toLowerCase();
            if(!code) return;
            if(messageListener) off(ref(db, `rooms/${currentRoom}/messages`));
            
            currentRoom = code;
            document.getElementById('current-room-display').innerText = `Room: ${currentRoom.toUpperCase()}`;
            document.getElementById('chat-messages').innerHTML = "";
            document.getElementById('room-code-input').value = "";
            
            messageListener = onChildAdded(ref(db, `rooms/${currentRoom}/messages`), (snap) => {
                const d = snap.val();
                const div = document.createElement('div');
                const isMine = d.uid === auth.currentUser?.uid;
                div.className = `message ${isMine ? 'mine' : ''} ${d.isBig ? 'big-style' : ''}`;
                div.innerHTML = `<b>${d.name}</b><span>${d.text}</span>`;
                document.getElementById('chat-messages').appendChild(div);
                document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
            });
        };

        // --- MESSAGING ---
        window.sendMessage = async (type) => {
            if ((Date.now() - lastSentTime) / 1000 < 3) return;
            const input = document.getElementById('chat-input'), text = input.value.trim();
            if(!text) return;

            const cost = type === 'broadcast' ? 500 : (type === 'big' ? 100 : 0);
            if(cost > currentCoins) return alert("Insufficient Coins!");

            lastSentTime = Date.now();
            runTransaction(ref(db, `users/${auth.currentUser.uid}/coins`), (v) => type === 'normal' ? (v || 0) + 10 : (v || 0) - cost);

            const name = auth.currentUser.email.split('@')[0];
            if(type === 'broadcast') {
                set(ref(db, 'global_broadcast'), { name, text, expiry: Date.now() + 7000 });
            } else {
                push(ref(db, `rooms/${currentRoom}/messages`), { uid: auth.currentUser.uid, name, text, isBig: type === 'big', time: serverTimestamp() });
            }
            input.value = "";
            startCooldown();
        };

        function startCooldown() {
            const btn = document.getElementById('send-btn'), cd = document.getElementById('cooldown-text'), sec = document.getElementById('seconds');
            btn.disabled = true; cd.style.display = 'block';
            let left = 3;
            const t = setInterval(() => {
                left--; sec.innerText = left;
                if(left <= 0) { clearInterval(t); btn.disabled = false; cd.style.display = 'none'; }
            }, 1000);
        }

        // --- BROADCAST LISTENER ---
        onValue(ref(db, 'global_broadcast'), (s) => {
            const d = s.val();
            if(d && d.expiry > Date.now()) {
                const el = document.getElementById('broadcast-screen');
                el.innerText = `${d.name}: ${d.text}`;
                el.style.display = 'flex';
                setTimeout(() => el.style.display = 'none', 7000);
            }
        });

        // --- INTERFACE ---
        document.getElementById('send-btn').onclick = () => sendMessage('normal');
        document.getElementById('theme-toggle').onclick = () => document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        document.getElementById('email-login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, password.value).catch(e => alert(e.message));
        document.getElementById('email-signup-btn').onclick = () => createUserWithEmailAndPassword(auth, email.value, password.value).catch(e => alert(e.message));
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, googleProvider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
    </script>
</body>
</html>
