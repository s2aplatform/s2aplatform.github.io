<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>S2A Platform</title>
    <script src='https://8x8.vc/vpaas-magic-cookie-36a469735d454659a5848600885e3532/external_api.js'></script>
    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --primary: #ff6d00;
            --gold: #ffd700;
            --danger: #ff4444;
            --success: #00c853;
            --broadcast: #ff00ff;
            
            /* Dark Mode Defaults */
            --bg: #121212;
            --nav-bg: #0a0a0a;
            --card-bg: #1e1e1e;
            --chat-bg: #141414;
            --msg-bg: #252525;
            --text: #e0e0e0;
            --border: #333;
            --input-bg: #1e1e1e;
        }

        /* Light Mode Overrides */
        [data-theme="light"] {
            --bg: #f0f2f5;
            --nav-bg: #ffffff;
            --card-bg: #ffffff;
            --chat-bg: #f9f9f9;
            --msg-bg: #e4e6eb;
            --text: #1c1e21;
            --border: #ddd;
            --input-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text);
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* --- BROADCAST & VIDEO (Stay Dark) --- */
        #broadcast-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 20000; display: none; justify-content: center; align-items: center; text-align: center; pointer-events: none; }
        .broadcast-content { color: var(--broadcast); font-size: 5rem; font-weight: 900; text-shadow: 0 0 30px var(--broadcast); animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        #video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; display: none; flex-direction: column; }
        #jitsi-container { flex: 1; width: 100%; }

        /* --- MAIN PLATFORM --- */
        #main-platform { display: none; flex-direction: column; width: 95%; max-width: 1000px; height: 85vh; background: var(--card-bg); border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid var(--border); overflow: hidden; }
        nav { background: var(--nav-bg); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .coin-box { color: var(--gold); font-weight: bold; background: rgba(128,128,128,0.1); padding: 6px 15px; border-radius: 20px; font-size: 0.9rem; }

        /* --- CHAT --- */
        #chat-messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; background: var(--chat-bg); }
        .message { background: var(--msg-bg); padding: 14px 18px; border-radius: 12px; max-width: 70%; width: fit-content; word-wrap: break-word; position: relative; color: var(--text); }
        .message.mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .message.mine b { color: #fff; }
        .message b { color: var(--primary); font-size: 0.8rem; display: block; margin-bottom: 4px; }
        .delete-btn { position: absolute; top: 5px; right: 8px; cursor: pointer; font-size: 14px; opacity: 0; transition: 0.2s; }
        .message:hover .delete-btn { opacity: 0.6; }

        .message.big-style { border: 3px solid var(--gold); background: linear-gradient(135deg, #2a2a2a, #111) !important; max-width: 90%; color: white; }
        .message.big-style span { font-size: 2.5rem; font-weight: 800; color: var(--gold); display: block; }

        /* --- INPUTS --- */
        .input-area { background: var(--nav-bg); padding: 25px; border-top: 1px solid var(--border); }
        .input-row { display: flex; gap: 12px; }
        #chat-input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 15px; border-radius: 8px; outline: none; }
        
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-theme { background: var(--msg-bg); color: var(--text); border: 1px solid var(--border); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-redeem { font-size: 0.75rem; margin-top: 10px; flex: 1; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: #1e1e1e; padding: 40px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body data-theme="dark">

    <div id="broadcast-screen"><div class="broadcast-content"><div id="broadcast-user" style="font-size: 1.5rem; color: white;"></div><div id="broadcast-msg"></div></div></div>
    <div id="video-overlay"><button class="btn" style="background:var(--danger); color:white; border-radius:0;" onclick="endCall()">❌ EXIT CALL</button><div id="jitsi-container"></div></div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="color: var(--primary);">S2A Platform 🔒</h1>
            <button id="google-login-btn" class="btn" style="width:100%; background:white; color:black; margin-bottom:10px;">Google Login</button>
            <input type="email" id="email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none;" placeholder="Email">
            <input type="password" id="password" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none;" placeholder="Password">
            <button id="email-login-btn" class="btn btn-primary" style="width: 100%;">Enter</button>
        </div>
    </div>

    <div id="main-platform">
        <nav>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div style="font-weight: bold; color: var(--primary);">S2A PLATFORM - 🌏全球即時串人聊天室💬</div>
                <button class="btn btn-theme" id="theme-toggle">🌙 Mode</button>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="btn" style="background:var(--success); color:white; padding: 8px 15px;" onclick="startCall()">📞 CALL</button>
                <div class="coin-box">💰 <span id="coin-count">0</span></div>
                <button id="logout-btn" class="btn" style="background:rgba(128,128,128,0.2); color:var(--text); padding: 5px 10px; font-size:0.7rem;">Logout</button>
            </div>
        </nav>

        <div id="chat-messages"></div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" id="chat-input" placeholder="Type message... (+10💰)">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
            <div id="cooldown-text" style="display:none; color:var(--danger); font-size:0.7rem;">Wait <span id="seconds">3</span>s...</div>
            <div style="display: flex; gap: 10px;">
                <button id="redeem-big" onclick="window.sendMessage('big')" class="btn btn-redeem" style="background: var(--gold); color:black;" disabled>BIG MSG (100💰)</button>
                <button id="redeem-broadcast" onclick="window.sendMessage('broadcast')" class="btn btn-redeem" style="background: var(--broadcast); color: white;" disabled>BROADCAST (500💰)</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, runTransaction, serverTimestamp, remove, query, limitToFirst, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVPhbTlWBa0xBw0wo2wMU7XwynwqwVzGM",
            authDomain: "ccc-loginsystem.firebaseapp.com",
            projectId: "ccc-loginsystem",
            databaseURL: "https://ccc-loginsystem-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "ccc-loginsystem.appspot.com",
            messagingSenderId: "205395547650",
            appId: "1:205395547650:web:fd8270d52e193ee03cb91b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        let currentCoins = 0;
        let lastSentTime = 0;
        let jitsiApi = null;

        // --- Theme Logic ---
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', target);
            themeBtn.innerText = target === 'dark' ? '🌙 Dark' : '☀️ Light';
        };

        // --- Broadcast ---
        onValue(ref(db, 'global_broadcast'), (snap) => {
            const data = snap.val();
            if (data && data.expiry > Date.now()) {
                document.getElementById('broadcast-user').innerText = `${data.name} BROADCAST:`;
                document.getElementById('broadcast-msg').innerText = data.text;
                document.getElementById('broadcast-screen').style.display = 'flex';
                setTimeout(() => { document.getElementById('broadcast-screen').style.display = 'none'; }, 7000);
            }
        });

        // --- Video ---
        window.startCall = () => {
            document.getElementById('video-overlay').style.display = 'flex';
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "S2A-Premium-Room", parentNode: document.querySelector('#jitsi-container'), userInfo: { displayName: auth.currentUser.displayName || "User" } });
        };
        window.endCall = () => { if(jitsiApi) jitsiApi.dispose(); document.getElementById('video-overlay').style.display = 'none'; };

        // --- Messaging ---
        window.sendMessage = async (type) => {
            if ((Date.now() - lastSentTime) / 1000 < 3) return;
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            const cost = type === 'broadcast' ? 500 : (type === 'big' ? 100 : 0);
            if(cost > currentCoins) return alert("Insufficient Coins!");

            lastSentTime = Date.now();
            runTransaction(ref(db, `users/${auth.currentUser.uid}/coins`), (v) => type === 'normal' ? (v || 0) + 10 : (v || 0) - cost);

            const uName = auth.currentUser.displayName || auth.currentUser.email.split('@')[0];
            if(type === 'broadcast') {
                set(ref(db, 'global_broadcast'), { name: uName, text: text, expiry: Date.now() + 8000 });
            } else {
                push(ref(db, 'chat_messages'), { uid: auth.currentUser.uid, name: uName, text: text, isBig: type === 'big', time: serverTimestamp() });
            }
            input.value = "";
            startCooldown();
        };

        function startCooldown() {
            const btn = document.getElementById('send-btn');
            const cd = document.getElementById('cooldown-text');
            btn.disabled = true; cd.style.display = 'block';
            let left = 3;
            const t = setInterval(() => {
                left--; document.getElementById('seconds').innerText = left;
                if(left <= 0) { clearInterval(t); btn.disabled = false; cd.style.display = 'none'; }
            }, 1000);
        }

        window.deleteMsg = (id) => { if(confirm("Delete?")) remove(ref(db, `chat_messages/${id}`)); };

        // --- Listeners ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
            document.getElementById('main-platform').style.display = user ? 'flex' : 'none';
            if(user) onValue(ref(db, `users/${user.uid}/coins`), (s) => {
                currentCoins = s.val() || 0;
                document.getElementById('coin-count').innerText = currentCoins;
                document.getElementById('redeem-big').disabled = currentCoins < 100;
                document.getElementById('redeem-broadcast').disabled = currentCoins < 500;
            });
        });

        onChildAdded(ref(db, 'chat_messages'), async (snap) => {
            const data = snap.val();
            const id = snap.key;
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            const isMine = data.uid === auth.currentUser?.uid;
            div.className = `message ${isMine ? 'mine' : ''} ${data.isBig ? 'big-style' : ''}`;
            div.innerHTML = `${isMine ? `<span class="delete-btn" onclick="window.deleteMsg('${id}')">🗑️</span>` : ''}<b>${data.name}</b><span>${data.text}</span>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            const snapshot = await get(ref(db, 'chat_messages'));
            if (snapshot.size > 50) {
                const oldest = query(ref(db, 'chat_messages'), limitToFirst(1));
                const oSnap = await get(oldest);
                oSnap.forEach((c) => remove(ref(db, `chat_messages/${c.key}`)));
            }
        });

        document.getElementById('send-btn').onclick = () => window.sendMessage('normal');
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, googleProvider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
    </script>
</body>
</html>
