<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>S2A Elite - Command Center</title>
    <script src='https://8x8.vc/vpaas-magic-cookie-36a469735d454659a5848600885e3532/external_api.js'></script>
    <style>
        :root {
            --primary: #ff6d00;
            --primary-glow: rgba(255, 109, 0, 0.4);
            --gold: #ffd700;
            --danger: #ff4444;
            --success: #00c853;
            --broadcast: #ff00ff;
            /* Dark Theme */
            --bg: #0f0f12;
            --panel: rgba(30, 30, 35, 0.8);
            --nav: #16161a;
            --text: #ffffff;
            --subtext: #a0a0ab;
            --border: rgba(255, 255, 255, 0.08);
            --input: #1c1c21;
        }

        [data-theme="light"] {
            --bg: #f4f4f9;
            --panel: rgba(255, 255, 255, 0.9);
            --nav: #ffffff;
            --text: #1a1a1e;
            --subtext: #666670;
            --border: rgba(0, 0, 0, 0.1);
            --input: #ffffff;
        }

        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            margin: 0; background-color: var(--bg); color: var(--text); 
            height: 100vh; display: flex; justify-content: center; align-items: center; 
            overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- OVERLAYS --- */
        #broadcast-screen { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 20000; 
            display: none; justify-content: center; align-items: center; text-align: center;
            backdrop-filter: blur(10px);
        }
        .broadcast-content h1 { 
            font-size: 5rem; font-weight: 900; color: var(--broadcast); 
            text-shadow: 0 0 40px var(--broadcast); margin: 0;
            animation: pulse 1.5s infinite alternate;
        }

        #video-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }

        /* --- AUTH CARD --- */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .auth-card { 
            background: var(--nav); padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; 
            text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .auth-input { 
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; 
            border: 1px solid var(--border); background: var(--input); color: var(--text); box-sizing: border-box; 
        }

        /* --- MAIN INTERFACE --- */
        #main-platform { 
            display: none; flex-direction: column; width: 95%; max-width: 1100px; height: 90vh; 
            background: var(--panel); border-radius: 30px; backdrop-filter: blur(20px);
            border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.5); overflow: hidden;
        }

        nav { 
            background: var(--nav); padding: 20px 30px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--border); 
        }

        #chat-messages { 
            flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; 
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.05));
        }

        /* --- MESSAGE STYLING --- */
        .message { 
            padding: 14px 20px; border-radius: 18px; max-width: 65%; position: relative; 
            background: var(--input); border: 1px solid var(--border); animation: slideUp 0.3s ease;
        }
        .message.mine { 
            align-self: flex-end; background: var(--primary); color: white; border: none;
            box-shadow: 0 4px 15px var(--primary-glow); border-bottom-right-radius: 4px;
        }
        .message b { font-size: 0.75rem; color: var(--primary); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .message.mine b { color: rgba(255,255,255,0.8); }
        
        .message.big-style { 
            max-width: 85%; border: 2px solid var(--gold); background: #000 !important; 
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); 
        }
        .message.big-style span { font-size: 2.5rem; font-weight: 800; color: var(--gold); display: block; line-height: 1.1; }

        .delete-btn { position: absolute; -right: 35px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0; transition: 0.2s; font-size: 1.2rem; }
        .message:hover .delete-btn { opacity: 0.5; }

        /* --- CONTROLS --- */
        .input-area { padding: 25px 35px; background: var(--nav); border-top: 1px solid var(--border); }
        .btn { 
            padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; 
            font-weight: 700; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-call { background: var(--success); color: white; box-shadow: 0 4px 12px rgba(0, 200, 83, 0.3); }

        .coin-display { 
            background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 8px 16px; border-radius: 100px; font-weight: 800;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { from { transform: scale(1); opacity: 1; } to { transform: scale(1.05); opacity: 0.8; } }
    </style>
</head>
<body data-theme="dark">

    <div id="broadcast-screen"><div class="broadcast-content"><p id="broadcast-user" style="color:white; letter-spacing:2px;"></p><h1 id="broadcast-msg"></h1></div></div>
    
    <div id="video-overlay">
        <div style="padding: 15px; background: #000; display: flex; justify-content: flex-end;">
            <button class="btn" style="background:var(--danger); color:white;" onclick="endCall()">End Call</button>
        </div>
        <div id="jitsi-container"></div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="margin: 0 0 10px 0; font-size: 2rem;">S2A <span style="color:var(--primary)">Elite</span></h1>
            <p style="color:var(--subtext); margin-bottom: 30px;">Access the secure command center</p>
            <button id="google-login-btn" class="btn" style="width:100%; background:white; color:black; margin-bottom:20px;">
                Continue with Google
            </button>
            <div style="height: 1px; background: var(--border); margin-bottom: 20px; position: relative;">
                <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--nav); padding: 0 10px; font-size: 0.8rem; color: var(--subtext);">OR</span>
            </div>
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="login-btn" class="btn btn-primary" style="flex:1;">Login</button>
                <button id="signup-btn" class="btn" style="flex:1; background:rgba(255,255,255,0.05); color:white;">Sign Up</button>
            </div>
        </div>
    </div>

    <div id="main-platform">
        <nav>
            <div style="display: flex; align-items: center; gap: 20px;">
                <b style="font-size: 1.4rem; letter-spacing: -1px;">S2A <span style="color:var(--primary)">.</span></b>
                <button class="btn" id="theme-toggle" style="background:rgba(255,255,255,0.05); color:var(--text); font-size:0.8rem; padding: 6px 12px;">🌙 Theme</button>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="btn btn-call" onclick="startCall()">📞 Call</button>
                <div class="coin-display">💰 <span id="coin-count">0</span></div>
                <button id="logout-btn" class="btn" style="background:transparent; color:var(--subtext); font-size:0.8rem;">Logout</button>
            </div>
        </nav>

        <div id="chat-messages"></div>

        <div class="input-area">
            <div style="display:flex; gap:12px; margin-bottom: 15px;">
                <input type="text" id="chat-input" style="flex:1; padding:15px 20px; border-radius:15px; border:1px solid var(--border); background:var(--input); color:var(--text); font-size: 1rem; outline:none;" placeholder="Transmit a message...">
                <button id="send-btn" class="btn btn-primary" style="padding: 0 30px;">Send</button>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="redeem-big" onclick="window.sendMessage('big')" class="btn" style="background:var(--gold); color:black; flex:1; font-size:0.8rem;" disabled>BIG MESSAGE (100💰)</button>
                <button id="redeem-broadcast" onclick="window.sendMessage('broadcast')" class="btn" style="background:var(--broadcast); color:white; flex:1; font-size:0.8rem;" disabled>GLOBAL BROADCAST (500💰)</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, runTransaction, serverTimestamp, remove, query, limitToFirst, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVPhbTlWBa0xBw0wo2wMU7XwynwqwVzGM",
            authDomain: "ccc-loginsystem.firebaseapp.com",
            projectId: "ccc-loginsystem",
            databaseURL: "https://ccc-loginsystem-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "ccc-loginsystem.appspot.com",
            messagingSenderId: "205395547650",
            appId: "1:205395547650:web:fd8270d52e193ee03cb91b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        let currentCoins = 0, lastSentTime = 0, jitsiApi = null;

        // --- Theme ---
        document.getElementById('theme-toggle').onclick = () => {
            const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', t);
            document.getElementById('theme-toggle').innerText = t === 'dark' ? '🌙 Theme' : '☀️ Theme';
        };

        // --- Auth ---
        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert("Access Denied"));
        };
        document.getElementById('signup-btn').onclick = () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert("Registry Failed"));
        };
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, googleProvider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-overlay').style.display = u ? 'none' : 'flex';
            document.getElementById('main-platform').style.display = u ? 'flex' : 'none';
            if(u) onValue(ref(db, `users/${u.uid}/coins`), (s) => {
                currentCoins = s.val() || 0;
                document.getElementById('coin-count').innerText = currentCoins;
                document.getElementById('redeem-big').disabled = currentCoins < 100;
                document.getElementById('redeem-broadcast').disabled = currentCoins < 500;
            });
        });

        // --- Core ---
        window.startCall = () => {
            document.getElementById('video-overlay').style.display = 'flex';
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "S2A-Elite-Command", parentNode: document.querySelector('#jitsi-container'), userInfo: { displayName: auth.currentUser.displayName || "Elite User" } });
        };
        window.endCall = () => { if(jitsiApi) jitsiApi.dispose(); document.getElementById('video-overlay').style.display = 'none'; };

        onValue(ref(db, 'global_broadcast'), (s) => {
            const d = s.val();
            if (d && d.expiry > Date.now()) {
                document.getElementById('broadcast-user').innerText = `${d.name} SENDS A PRIORITY ALERT`;
                document.getElementById('broadcast-msg').innerText = d.text;
                document.getElementById('broadcast-screen').style.display = 'flex';
                setTimeout(() => document.getElementById('broadcast-screen').style.display = 'none', 7000);
            }
        });

        window.sendMessage = async (type) => {
            if ((Date.now() - lastSentTime) / 1000 < 1.5) return;
            const input = document.getElementById('chat-input'), text = input.value.trim();
            if(!text) return;
            const cost = type === 'broadcast' ? 500 : (type === 'big' ? 100 : 0);
            if(cost > currentCoins) return alert("Insufficient Credits");
            
            lastSentTime = Date.now();
            runTransaction(ref(db, `users/${auth.currentUser.uid}/coins`), (v) => type === 'normal' ? (v || 0) + 10 : (v || 0) - cost);
            const name = auth.currentUser.displayName || auth.currentUser.email.split('@')[0];
            
            if(type === 'broadcast') set(ref(db, 'global_broadcast'), { name, text, expiry: Date.now() + 8000 });
            else push(ref(db, 'chat_messages'), { uid: auth.currentUser.uid, name, text, isBig: type === 'big', time: serverTimestamp() });
            input.value = "";
        };

        window.deleteMsg = (id) => { if(confirm("Erase data point?")) remove(ref(db, `chat_messages/${id}`)); };

        onChildAdded(ref(db, 'chat_messages'), async (snap) => {
            const d = snap.val(), id = snap.key, isMine = d.uid === auth.currentUser?.uid;
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = `message ${isMine ? 'mine' : ''} ${d.isBig ? 'big-style' : ''}`;
            div.innerHTML = `${isMine ? `<span class="delete-btn" onclick="window.deleteMsg('${id}')">🗑️</span>` : ''}<b>${d.name}</b><span>${d.text}</span>`;
            document.getElementById('chat-messages').appendChild(div);
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

            const snapMsg = await get(ref(db, 'chat_messages'));
            if (snapMsg.size > 50) {
                const oldest = await get(query(ref(db, 'chat_messages'), limitToFirst(1)));
                oldest.forEach(c => remove(ref(db, `chat_messages/${c.key}`)));
            }
        });

        document.getElementById('send-btn').onclick = () => window.sendMessage('normal');
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.sendMessage('normal'); });
    </script>
</body>
</html>
