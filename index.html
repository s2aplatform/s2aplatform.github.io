<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>S2A Platform - Broadcast Edition</title>
    <script src='https://8x8.vc/vpaas-magic-cookie-36a469735d454659a5848600885e3532/external_api.js'></script>
    <style>
        :root {
            --primary: #ff6d00;
            --dark: #121212;
            --card: #1e1e1e;
            --gold: #ffd700;
            --text: #e0e0e0;
            --danger: #ff4444;
            --success: #00c853;
            --broadcast: #ff00ff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; background-color: var(--dark); color: var(--text);
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* --- BROADCAST OVERLAY --- */
        #broadcast-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 20000;
            display: none; justify-content: center; align-items: center;
            text-align: center; pointer-events: none; /* Allows clicking through if needed */
        }
        .broadcast-content {
            color: var(--broadcast); font-size: 5rem; font-weight: 900;
            text-shadow: 0 0 30px var(--broadcast); animation: pulse 1s infinite alternate;
            padding: 20px;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* --- PREVIOUS STYLES --- */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 10000; display: flex; justify-content: center; align-items: center; }
        #video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; }
        #jitsi-container { flex: 1; width: 100%; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }

        #main-platform { display: none; flex-direction: column; width: 95%; max-width: 1000px; height: 85vh; background: #181818; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid #333; overflow: hidden; }
        nav { background: #0a0a0a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .coin-box { color: var(--gold); font-weight: bold; background: #222; padding: 6px 15px; border-radius: 20px; font-size: 0.9rem; }

        #chat-messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; background: #141414; }
        .message { background: #252525; padding: 14px 18px; border-radius: 12px; max-width: 70%; width: fit-content; word-wrap: break-word; position: relative; }
        .message.mine { align-self: flex-end; background: #333; border-bottom-right-radius: 2px; }
        .message b { color: var(--primary); font-size: 0.8rem; display: block; margin-bottom: 4px; }
        .delete-btn { position: absolute; top: 5px; right: 8px; cursor: pointer; font-size: 14px; opacity: 0.3; }

        .message.big-style span { font-size: 2.8rem; font-weight: 800; line-height: 1.1; color: var(--gold); }

        .input-area { background: #0a0a0a; padding: 25px; border-top: 1px solid #222; }
        .input-row { display: flex; gap: 12px; }
        #chat-input { flex: 1; background: #1e1e1e; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; outline: none; }
        
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-call { background: var(--success); color: white; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-redeem { font-size: 0.75rem; margin-top: 10px; flex: 1; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        #cooldown-text { color: var(--danger); font-size: 0.75rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div id="broadcast-screen">
        <div class="broadcast-content">
            <div id="broadcast-user" style="font-size: 1.5rem; color: white; opacity: 0.8;"></div>
            <div id="broadcast-msg">HELLO WORLD</div>
        </div>
    </div>

    <div id="video-overlay">
        <button class="btn" style="background:var(--danger); color:white; border-radius:0;" onclick="endCall()">❌ EXIT CALL</button>
        <div id="jitsi-container"></div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="color: var(--primary);">S2A Platform 🔒</h1>
            <button id="google-login-btn" class="auth-input" style="cursor:pointer; background:white; color:black;">Google Login</button>
            <div style="margin: 10px 0; color:#444;">OR</div>
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <button id="email-login-btn" class="btn btn-primary" style="width: 100%;">Enter</button>
        </div>
    </div>

    <div id="main-platform">
        <nav>
            <div style="font-weight: bold; color: var(--primary);">S2A PLATFORM</div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="btn btn-call" style="padding: 8px 15px;" onclick="startCall()">📞 CALL</button>
                <div class="coin-box">💰 <span id="coin-count">0</span></div>
                <button id="logout-btn" class="btn" style="background:#222; color:#888; padding: 5px 10px; font-size:0.7rem;">Logout</button>
            </div>
        </nav>

        <div id="chat-messages"></div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" id="chat-input" placeholder="Type message... (+10💰)">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
            <div id="cooldown-text">Wait <span id="seconds">3</span>s...</div>
            <div style="display: flex; gap: 10px;">
                <button id="redeem-big" onclick="window.sendMessage('big')" class="btn btn-redeem" style="background: var(--gold);" disabled>BIG MSG (100💰)</button>
                <button id="redeem-broadcast" onclick="window.sendMessage('broadcast')" class="btn btn-redeem" style="background: var(--broadcast); color: white;" disabled>BROADCAST (500💰)</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, runTransaction, serverTimestamp, remove, query, limitToFirst, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVPhbTlWBa0xBw0wo2wMU7XwynwqwVzGM",
            authDomain: "ccc-loginsystem.firebaseapp.com",
            projectId: "ccc-loginsystem",
            databaseURL: "https://ccc-loginsystem-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "ccc-loginsystem.appspot.com",
            messagingSenderId: "205395547650",
            appId: "1:205395547650:web:fd8270d52e193ee03cb91b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        let currentCoins = 0;
        let lastSentTime = 0;
        let jitsiApi = null;

        // --- Broadcast System ---
        function triggerBroadcast(name, text) {
            const screen = document.getElementById('broadcast-screen');
            document.getElementById('broadcast-user').innerText = `🔥 ${name} SAYS: 🔥`;
            document.getElementById('broadcast-msg').innerText = text;
            screen.style.display = 'flex';
            setTimeout(() => { screen.style.display = 'none'; }, 7000); // Display for 7 seconds
        }

        // Listen for global broadcasts
        onValue(ref(db, 'global_broadcast'), (snap) => {
            const data = snap.val();
            if (data && data.expiry > Date.now()) {
                triggerBroadcast(data.name, data.text);
            }
        });

        // --- Call Logic ---
        window.startCall = () => {
            document.getElementById('video-overlay').style.display = 'flex';
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "S2A-Global-Elite", parentNode: document.querySelector('#jitsi-container'), userInfo: { displayName: auth.currentUser.displayName || "User" } });
        };
        window.endCall = () => { if(jitsiApi) jitsiApi.dispose(); document.getElementById('video-overlay').style.display = 'none'; };

        // --- Messaging + Redeem ---
        window.sendMessage = async (type) => {
            const now = Date.now();
            if ((now - lastSentTime) / 1000 < 3) return;

            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            let cost = type === 'broadcast' ? 500 : (type === 'big' ? 100 : 0);
            if(cost > currentCoins) return alert("Not enough coins!");

            lastSentTime = now;
            
            runTransaction(ref(db, `users/${auth.currentUser.uid}/coins`), (v) => {
                if (type === 'broadcast') return (v || 0) - 500;
                if (type === 'big') return (v || 0) - 100;
                return (v || 0) + 10;
            });

            const userName = auth.currentUser.displayName || auth.currentUser.email.split('@')[0];

            if (type === 'broadcast') {
                set(ref(db, 'global_broadcast'), { name: userName, text: text, expiry: Date.now() + 8000 });
            } else {
                push(ref(db, 'chat_messages'), { uid: auth.currentUser.uid, name: userName, text: text, isBig: type === 'big', time: serverTimestamp() });
            }

            input.value = "";
            startCooldown();
        };

        function startCooldown() {
            const btn = document.getElementById('send-btn');
            document.getElementById('cooldown-text').style.display = 'block';
            btn.disabled = true;
            let left = 3;
            const timer = setInterval(() => {
                left--;
                document.getElementById('seconds').innerText = left;
                if(left <= 0) { clearInterval(timer); btn.disabled = false; document.getElementById('cooldown-text').style.display = 'none'; document.getElementById('seconds').innerText = "3"; }
            }, 1000);
        }

        // --- Listeners ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
            document.getElementById('main-platform').style.display = user ? 'flex' : 'none';
            if(user) onValue(ref(db, `users/${user.uid}/coins`), (s) => {
                currentCoins = s.val() || 0;
                document.getElementById('coin-count').innerText = currentCoins;
                document.getElementById('redeem-big').disabled = currentCoins < 100;
                document.getElementById('redeem-broadcast').disabled = currentCoins < 500;
            });
        });

        onChildAdded(ref(db, 'chat_messages'), async (snap) => {
            const data = snap.val();
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const isMine = data.uid === auth.currentUser?.uid;
            div.className = `message ${isMine ? 'mine' : ''} ${data.isBig ? 'big-style' : ''}`;
            div.innerHTML = `<b>${data.name}</b><span>${data.text}</span>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });

        document.getElementById('send-btn').onclick = () => window.sendMessage('normal');
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, googleProvider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
    </script>
</body>
</html>
