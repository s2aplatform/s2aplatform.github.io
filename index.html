<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>S2A Platform</title>
    <script src='https://8x8.vc/vpaas-magic-cookie-36a469735d454659a5848600885e3532/external_api.js'></script>
    <style>
        :root {
            --primary: #ff6d00;
            --primary-glow: rgba(255, 109, 0, 0.4);
            --gold: #ffd700;
            --danger: #ff4444;
            --success: #00c853;
            --broadcast: #ff00ff;
            /* Dark Theme */
            --bg: #0b0b0d;
            --panel: rgba(25, 25, 30, 0.85);
            --nav: #16161a;
            --text: #ffffff;
            --subtext: #8e8e93;
            --border: rgba(255, 255, 255, 0.1);
            --input: #121214;
        }

        [data-theme="light"] {
            --bg: #f4f4f9;
            --panel: rgba(255, 255, 255, 0.9);
            --nav: #ffffff;
            --text: #1a1a1e;
            --subtext: #666670;
            --border: rgba(0, 0, 0, 0.1);
            --input: #ffffff;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text); 
            height: 100vh; display: flex; justify-content: center; align-items: center; 
            overflow: hidden; transition: all 0.4s ease;
        }

        /* --- AUTH CARD --- */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0b0b0d 100%); }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 28px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); backdrop-filter: blur(15px); }
        .logo-area h1 { margin: 0; font-size: 2.2rem; letter-spacing: -1px; }
        .logo-area span { color: var(--primary); }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 600; color: var(--subtext); margin-bottom: 5px; text-transform: uppercase; }
        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--input); color: white; box-sizing: border-box; }
        .auth-error { color: var(--danger); font-size: 0.8rem; margin-top: 10px; min-height: 1.2rem; }

        /* --- MAIN INTERFACE --- */
        #main-platform { display: none; flex-direction: column; width: 95%; max-width: 1100px; height: 90vh; background: var(--panel); border-radius: 30px; border: 1px solid var(--border); overflow: hidden; backdrop-filter: blur(20px); }
        nav { background: var(--nav); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        
        /* --- MESSAGES --- */
        .message { padding: 12px 18px; border-radius: 15px; max-width: 65%; position: relative; background: var(--input); border: 1px solid var(--border); animation: slideUp 0.3s ease; }
        .message.mine { align-self: flex-end; background: var(--primary); color: white; border: none; border-bottom-right-radius: 4px; }
        .message b { font-size: 0.7rem; color: var(--primary); display: block; margin-bottom: 3px; }
        .message.mine b { color: rgba(255,255,255,0.8); }
        .message.big-style { border: 2px solid var(--gold); background: #000 !important; max-width: 85%; }
        .message.big-style span { font-size: 2.2rem; font-weight: 800; color: var(--gold); line-height: 1.1; }
        .delete-btn { position: absolute; -right: 30px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0; font-size: 1.1rem; }
        .message:hover .delete-btn { opacity: 0.5; }

        /* --- BROADCAST & VIDEO --- */
        #broadcast-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: none; justify-content: center; align-items: center; text-align: center; }
        #video-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        
        /* --- BUTTONS --- */
        .btn { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); }
        .input-area { padding: 20px 30px; background: var(--nav); border-top: 1px solid var(--border); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body data-theme="dark">

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="logo-area" style="margin-bottom: 25px;">
                <h1>S2A<span>.</span>Platform 會員系統🔒</h1>
                <p style="color:var(--subtext); font-size: 0.8rem;">Secure Communication Terminal</p>
            </div>
            <button id="google-login-btn" class="btn" style="width:100%; background:white; color:black; margin-bottom:20px; justify-content:center;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Continue with Google
            </button>
            <div style="display:flex; align-items:center; margin-bottom:20px; color:var(--subtext); font-size:0.7rem;">
                <div style="flex:1; height:1px; background:var(--border);"></div><div style="margin:0 10px;">OR</div><div style="flex:1; height:1px; background:var(--border);"></div>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" class="auth-input" placeholder="name@email.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" class="auth-input" placeholder="••••••••">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="email-login-btn" class="btn btn-primary" style="flex:2; justify-content:center;">Login</button>
                <button id="email-signup-btn" class="btn btn-secondary" style="flex:1; justify-content:center;">Sign Up</button>
            </div>
            <div id="auth-error" class="auth-error"></div>
        </div>
    </div>

    <div id="main-platform">
        <nav>
            <div style="display: flex; align-items: center; gap: 15px;">
                <b style="font-size: 1.2rem;">S2A <span style="color:var(--primary)">Platform - 🌏全球即時串人聊天室💬</span></b>
                <button class="btn" id="theme-toggle" style="background:rgba(255,255,255,0.05); color:var(--text); font-size:0.7rem; padding: 5px 10px;">🌙 Theme</button>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="btn" style="background:var(--success); color:white; padding: 8px 15px;" onclick="startCall()">📞 CALL</button>
                <div style="background:rgba(255,215,0,0.1); color:var(--gold); padding:8px 15px; border-radius:100px; font-weight:800; border:1px solid rgba(255,215,0,0.2);">💰 <span id="coin-count">0</span></div>
                <button id="logout-btn" class="btn" style="background:transparent; color:var(--subtext); font-size:0.7rem;">Logout</button>
            </div>
        </nav>
        <div id="chat-messages"></div>
        <div class="input-area">
            <div style="display:flex; gap:10px; margin-bottom:12px;">
                <input type="text" id="chat-input" style="flex:1; padding:15px; border-radius:12px; border:1px solid var(--border); background:var(--input); color:white; outline:none;" placeholder="Transmit message...">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
            <div style="display:flex; gap:10px;">
                <button id="redeem-big" onclick="window.sendMessage('big')" class="btn" style="background:var(--gold); color:black; flex:1; font-size:0.75rem; justify-content:center;" disabled>BIG MSG (100💰)</button>
                <button id="redeem-broadcast" onclick="window.sendMessage('broadcast')" class="btn" style="background:var(--broadcast); color:white; flex:1; font-size:0.75rem; justify-content:center;" disabled>BROADCAST (500💰)</button>
            </div>
        </div>
    </div>

    <div id="broadcast-screen"><div style="color:var(--broadcast); font-size:4rem; font-weight:900; text-shadow:0 0 30px var(--broadcast);" id="broadcast-msg"></div></div>
    <div id="video-overlay"><button class="btn" style="background:var(--danger); color:white; border-radius:0;" onclick="endCall()">EXIT CALL</button><div id="jitsi-container" style="flex:1;"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, runTransaction, serverTimestamp, remove, query, limitToFirst, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVPhbTlWBa0xBw0wo2wMU7XwynwqwVzGM",
            authDomain: "ccc-loginsystem.firebaseapp.com",
            projectId: "ccc-loginsystem",
            databaseURL: "https://ccc-loginsystem-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "ccc-loginsystem.appspot.com",
            messagingSenderId: "205395547650",
            appId: "1:205395547650:web:fd8270d52e193ee03cb91b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        let currentCoins = 0, lastSentTime = 0, jitsiApi = null;

        // --- Auth Helpers ---
        const errorDiv = document.getElementById('auth-error');
        const showError = (e) => errorDiv.innerText = e.message.replace("Firebase: ", "");

        document.getElementById('email-login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, password.value).catch(showError);
        document.getElementById('email-signup-btn').onclick = () => createUserWithEmailAndPassword(auth, email.value, password.value).catch(showError);
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, googleProvider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-overlay').style.display = u ? 'none' : 'flex';
            document.getElementById('main-platform').style.display = u ? 'flex' : 'none';
            if(u) {
                errorDiv.innerText = "";
                onValue(ref(db, `users/${u.uid}/coins`), (s) => {
                    currentCoins = s.val() || 0;
                    document.getElementById('coin-count').innerText = currentCoins;
                    document.getElementById('redeem-big').disabled = currentCoins < 100;
                    document.getElementById('redeem-broadcast').disabled = currentCoins < 500;
                });
            }
        });

        // --- Core Logic ---
        window.sendMessage = async (type) => {
            if ((Date.now() - lastSentTime) / 1000 < 2) return;
            const input = document.getElementById('chat-input'), text = input.value.trim();
            if(!text) return;
            const cost = type === 'broadcast' ? 500 : (type === 'big' ? 100 : 0);
            if(cost > currentCoins) return alert("Insufficient Credits");
            
            lastSentTime = Date.now();
            runTransaction(ref(db, `users/${auth.currentUser.uid}/coins`), (v) => type === 'normal' ? (v || 0) + 10 : (v || 0) - cost);
            const name = auth.currentUser.email.split('@')[0];
            
            if(type === 'broadcast') set(ref(db, 'global_broadcast'), { name, text, expiry: Date.now() + 8000 });
            else push(ref(db, 'chat_messages'), { uid: auth.currentUser.uid, name, text, isBig: type === 'big', time: serverTimestamp() });
            input.value = "";
        };

        onChildAdded(ref(db, 'chat_messages'), (snap) => {
            const d = snap.val(), isMine = d.uid === auth.currentUser?.uid;
            const div = document.createElement('div');
            div.className = `message ${isMine ? 'mine' : ''} ${d.isBig ? 'big-style' : ''}`;
            div.innerHTML = `${isMine ? `<span class="delete-btn" onclick="remove(ref(db, 'chat_messages/${snap.key}'))">🗑️</span>` : ''}<b>${d.name}</b><span>${d.text}</span>`;
            document.getElementById('chat-messages').appendChild(div);
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
        });

        window.startCall = () => {
            document.getElementById('video-overlay').style.display = 'flex';
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "S2A-Elite-Room", parentNode: document.querySelector('#jitsi-container') });
        };
        window.endCall = () => { if(jitsiApi) jitsiApi.dispose(); document.getElementById('video-overlay').style.display = 'none'; };

        document.getElementById('send-btn').onclick = () => window.sendMessage('normal');
        document.getElementById('theme-toggle').onclick = () => document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    </script>
</body>
</html>
