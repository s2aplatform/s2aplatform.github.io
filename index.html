<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>S2A Platform - Professional</title>
    <script src='https://8x8.vc/vpaas-magic-cookie-36a469735d454659a5848600885e3532/external_api.js'></script>
    <style>
        :root {
            --primary: #ff6d00;
            --gold: #ffd700;
            --danger: #ff4444;
            --success: #00c853;
            --broadcast: #ff00ff;
            --bg: #121212;
            --nav-bg: #0a0a0a;
            --card-bg: #1e1e1e;
            --chat-bg: #141414;
            --msg-bg: #252525;
            --text: #e0e0e0;
            --border: #333;
            --input-bg: #1e1e1e;
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --nav-bg: #ffffff;
            --card-bg: #ffffff;
            --chat-bg: #f9f9f9;
            --msg-bg: #e4e6eb;
            --text: #1c1e21;
            --border: #ddd;
            --input-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text);
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
            transition: 0.3s;
        }

        /* --- BROADCAST & VIDEO --- */
        #broadcast-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 20000; display: none; justify-content: center; align-items: center; text-align: center; }
        .broadcast-content { color: var(--broadcast); font-size: 4rem; font-weight: 900; text-shadow: 0 0 20px var(--broadcast); }
        #video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; display: none; flex-direction: column; }
        #jitsi-container { flex: 1; width: 100%; }

        /* --- AUTH --- */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: #1e1e1e; padding: 30px; border-radius: 16px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #2b2b2b; color: white; box-sizing: border-box; }
        .auth-btns { display: flex; gap: 10px; }

        /* --- MAIN --- */
        #main-platform { display: none; flex-direction: column; width: 95%; max-width: 1000px; height: 85vh; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        nav { background: var(--nav-bg); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        #chat-messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; background: var(--chat-bg); }
        .message { background: var(--msg-bg); padding: 12px 16px; border-radius: 12px; max-width: 70%; position: relative; }
        .message.mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .message b { color: var(--primary); font-size: 0.75rem; display: block; }
        .message.mine b { color: #fff; opacity: 0.8; }
        .delete-btn { position: absolute; top: 5px; right: 8px; cursor: pointer; opacity: 0; transition: 0.2s; }
        .message:hover .delete-btn { opacity: 0.6; }

        .message.big-style { border: 2px solid var(--gold); background: linear-gradient(135deg, #2a2a2a, #000) !important; color: white; max-width: 90%; }
        .message.big-style span { font-size: 2.2rem; font-weight: 800; color: var(--gold); }

        .input-area { background: var(--nav-bg); padding: 20px; border-top: 1px solid var(--border); }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; flex: 1; }
        .btn-secondary { background: #333; color: white; flex: 1; }
        .btn-theme { background: var(--msg-bg); color: var(--text); font-size: 0.8rem; }
    </style>
</head>
<body data-theme="dark">

    <div id="broadcast-screen"><div class="broadcast-content"><div id="broadcast-user" style="font-size: 1.2rem; color: #fff;"></div><div id="broadcast-msg"></div></div></div>
    <div id="video-overlay"><button class="btn" style="background:var(--danger); color:white; border-radius:0;" onclick="endCall()">❌ EXIT CALL</button><div id="jitsi-container"></div></div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="color: var(--primary); margin-top: 0;">S2A Platform</h1>
            <button id="google-login-btn" class="btn" style="width:100%; background:white; color:black; margin-bottom:15px; display:flex; align-items:center; justify-content:center; gap:10px;">Login with Google</button>
            <div style="color: #666; font-size: 0.8rem; margin-bottom: 15px;">OR USE EMAIL</div>
            <input type="email" id="email" class="auth-input" placeholder="Email Address">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <div class="auth-btns">
                <button id="login-btn" class="btn btn-primary">Login</button>
                <button id="signup-btn" class="btn btn-secondary">Sign Up</button>
            </div>
            <p id="auth-error" style="color: var(--danger); font-size: 0.75rem; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="main-platform">
        <nav>
            <div style="display: flex; gap: 10px; align-items: center;">
                <b style="color: var(--primary);">S2A</b>
                <button class="btn btn-theme" id="theme-toggle">🌙 Theme</button>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="btn" style="background:var(--success); color:white; padding:5px 12px; font-size:0.8rem;" onclick="startCall()">📞 CALL</button>
                <div style="color:var(--gold); font-weight:bold; font-size:0.9rem;">💰<span id="coin-count">0</span></div>
                <button id="logout-btn" class="btn" style="background:rgba(255,255,255,0.1); color:var(--text); font-size:0.7rem;">Logout</button>
            </div>
        </nav>

        <div id="chat-messages"></div>

        <div class="input-area">
            <div class="input-row" style="display:flex; gap:10px;">
                <input type="text" id="chat-input" style="flex:1; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--text);" placeholder="Message...">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
            <div id="cooldown-text" style="display:none; color:var(--danger); font-size:0.7rem; margin-top:5px;">Wait <span id="seconds">3</span>s...</div>
            <div style="display: flex; gap: 8px; margin-top:10px;">
                <button id="redeem-big" onclick="window.sendMessage('big')" class="btn" style="background:var(--gold); color:black; font-size:0.7rem; flex:1;" disabled>BIG MSG (100💰)</button>
                <button id="redeem-broadcast" onclick="window.sendMessage('broadcast')" class="btn" style="background:var(--broadcast); color:white; font-size:0.7rem; flex:1;" disabled>BROADCAST (500💰)</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, runTransaction, serverTimestamp, remove, query, limitToFirst, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVPhbTlWBa0xBw0wo2wMU7XwynwqwVzGM",
            authDomain: "ccc-loginsystem.firebaseapp.com",
            projectId: "ccc-loginsystem",
            databaseURL: "https://ccc-loginsystem-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "ccc-loginsystem.appspot.com",
            messagingSenderId: "205395547650",
            appId: "1:205395547650:web:fd8270d52e193ee03cb91b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        let currentCoins = 0, lastSentTime = 0, jitsiApi = null;

        // --- Theme ---
        document.getElementById('theme-toggle').onclick = () => {
            const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', t);
        };

        // --- Auth Restore ---
        const showError = (m) => document.getElementById('auth-error').innerText = m;
        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => showError("Login failed. Check credentials."));
        };
        document.getElementById('signup-btn').onclick = () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => showError("Sign up failed. Use a valid email."));
        };
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, googleProvider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // --- Video/Broadcast ---
        window.startCall = () => {
            document.getElementById('video-overlay').style.display = 'flex';
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "S2A-Global-Pro-Room", parentNode: document.querySelector('#jitsi-container'), userInfo: { displayName: auth.currentUser.displayName || "User" } });
        };
        window.endCall = () => { if(jitsiApi) jitsiApi.dispose(); document.getElementById('video-overlay').style.display = 'none'; };

        onValue(ref(db, 'global_broadcast'), (s) => {
            const d = s.val();
            if (d && d.expiry > Date.now()) {
                document.getElementById('broadcast-user').innerText = d.name;
                document.getElementById('broadcast-msg').innerText = d.text;
                document.getElementById('broadcast-screen').style.display = 'flex';
                setTimeout(() => document.getElementById('broadcast-screen').style.display = 'none', 7000);
            }
        });

        // --- Messaging ---
        window.sendMessage = async (type) => {
            if ((Date.now() - lastSentTime) / 1000 < 3) return;
            const input = document.getElementById('chat-input'), text = input.value.trim();
            if(!text) return;
            const cost = type === 'broadcast' ? 500 : (type === 'big' ? 100 : 0);
            if(cost > currentCoins) return alert("No coins!");
            
            lastSentTime = Date.now();
            runTransaction(ref(db, `users/${auth.currentUser.uid}/coins`), (v) => type === 'normal' ? (v || 0) + 10 : (v || 0) - cost);
            const name = auth.currentUser.displayName || auth.currentUser.email.split('@')[0];
            
            if(type === 'broadcast') set(ref(db, 'global_broadcast'), { name, text, expiry: Date.now() + 8000 });
            else push(ref(db, 'chat_messages'), { uid: auth.currentUser.uid, name, text, isBig: type === 'big', time: serverTimestamp() });
            
            input.value = ""; startCooldown();
        };

        function startCooldown() {
            const b = document.getElementById('send-btn'), c = document.getElementById('cooldown-text');
            b.disabled = true; c.style.display = 'block';
            let l = 3;
            const t = setInterval(() => {
                l--; document.getElementById('seconds').innerText = l;
                if(l <= 0) { clearInterval(t); b.disabled = false; c.style.display = 'none'; }
            }, 1000);
        }

        window.deleteMsg = (id) => { if(confirm("Delete?")) remove(ref(db, `chat_messages/${id}`)); };

        onAuthStateChanged(auth, (u) => {
            document.getElementById('auth-overlay').style.display = u ? 'none' : 'flex';
            document.getElementById('main-platform').style.display = u ? 'flex' : 'none';
            if(u) onValue(ref(db, `users/${u.uid}/coins`), (s) => {
                currentCoins = s.val() || 0;
                document.getElementById('coin-count').innerText = currentCoins;
                document.getElementById('redeem-big').disabled = currentCoins < 100;
                document.getElementById('redeem-broadcast').disabled = currentCoins < 500;
            });
        });

        onChildAdded(ref(db, 'chat_messages'), async (snap) => {
            const d = snap.val(), id = snap.key, isMine = d.uid === auth.currentUser?.uid;
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = `message ${isMine ? 'mine' : ''} ${d.isBig ? 'big-style' : ''}`;
            div.innerHTML = `${isMine ? `<span class="delete-btn" onclick="window.deleteMsg('${id}')">🗑️</span>` : ''}<b>${d.name}</b><span>${d.text}</span>`;
            document.getElementById('chat-messages').appendChild(div);
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

            const snapMsg = await get(ref(db, 'chat_messages'));
            if (snapMsg.size > 50) {
                const oldest = await get(query(ref(db, 'chat_messages'), limitToFirst(1)));
                oldest.forEach(c => remove(ref(db, `chat_messages/${c.key}`)));
            }
        });

        document.getElementById('send-btn').onclick = () => window.sendMessage('normal');
    </script>
</body>
</html>
